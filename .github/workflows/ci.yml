name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-07-09
          components: rustfmt, clippy
      - uses: astral-sh/setup-uv@v6
      - run: rustup component add rust-src
      - run: cargo fmt --all -- --check
      - run: uv run scripts/check-requirements.py
      - run: cargo test --locked --target x86_64-unknown-linux-gnu
      - run: cargo clippy -Zbuild-std=core --target riscv32imfc-unknown-none-elf -- -D warnings
      - run: cargo build -Zbuild-std=core --target riscv32imfc-unknown-none-elf

  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify budget accounting invariant
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          kani-version: "0.67.0"
          args: "--harness remaining_never_exceeds_capacity"
      - name: Verify stale resource generations cannot alias
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          kani-version: "0.67.0"
          args: "--harness stale_resource_generation_never_aliases_reused_slot"
      - name: Verify destroyed resource handles fail closed
        uses: model-checking/kani-github-action@f838096619a707b0f6b2118cf435eaccfa33e51f # v1.1
        with:
          kani-version: "0.67.0"
          args: "--harness destroyed_resource_handle_cannot_be_resolved_twice"

  tla:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download pinned TLA+ tools
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar \
            --output /tmp/tla2tools.jar
          echo "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88  /tmp/tla2tools.jar" \
            | sha256sum --check
      - name: Check scheduler budget model
        working-directory: spec
        run: java -cp /tmp/tla2tools.jar tlc2.TLC -workers 4 -config SchedulerBudget.cfg SchedulerBudget.tla
      - name: Check resource lifecycle model
        working-directory: spec
        run: java -cp /tmp/tla2tools.jar tlc2.TLC -workers 4 -config ResourceLifecycle.cfg ResourceLifecycle.tla
